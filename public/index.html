<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AcademyCP Lab 11</title>
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
        color: #17202a;
        background: #f4f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(23, 32, 42, 0.08);
      }

      h1 {
        margin: 0 0 20px;
        font-size: 24px;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 14px;
        font-weight: 700;
      }

      input {
        min-height: 40px;
        border: 1px solid #b6c4d1;
        border-radius: 6px;
        padding: 0 12px;
        font: inherit;
      }

      button {
        width: 100%;
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        background: #1f7a5c;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .message {
        min-height: 24px;
        margin-top: 14px;
        color: #9b1c1c;
        font-weight: 700;
      }

      .message[data-state="success"] {
        color: #166534;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Регистрация на курс</h1>
      <form id="signup-form" novalidate>
        <label>
          Имя
          <input id="name" name="name" autocomplete="name" required>
        </label>
        <label>
          Email
          <input id="email" name="email" type="email" autocomplete="email" required>
        </label>
        <button id="submit-button" type="submit">Отправить заявку</button>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </main>
    <script>
      const form = document.querySelector("#signup-form");
      const message = document.querySelector("#message");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const name = form.elements.name.value.trim();
        const email = form.elements.email.value.trim();

        if (!name || !email) {
          message.dataset.state = "error";
          message.textContent = "Заполните имя и email";
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          message.dataset.state = "error";
          message.textContent = "Введите корректный email";
          return;
        }

        message.dataset.state = "success";
        message.textContent = `Заявка для ${name} отправлена`;
      });
    </script>
  </body>
</html>
